apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert --file docker-compose.yml --out k8s/ --volumes hostPath
    kompose.version: 1.32.0 (765fde254)
  labels:
    io.kompose.service: prediction-service
  name: prediction-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: prediction-service
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert --file docker-compose.yml --out k8s/ --volumes hostPath
        kompose.version: 1.32.0 (765fde254)
      labels:
        io.kompose.network/plataforma-mlops-mlops-net: "true"
        io.kompose.service: prediction-service
    spec:
      containers:
        - env:
            - name: LOG_PATH
              value: /app/logs/predictions.csv
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow-server:5000
            - name: MODEL_URI
              value: models:/prediction-energy-model/Production
            - name: PORT
              value: "8001"
          image: prediction-service
          name: prediction-service
          ports:
            - containerPort: 8001
              hostPort: 8001
              protocol: TCP
          volumeMounts:
            - mountPath: /app/logs
              name: prediction-service-hostpath0
            - mountPath: /app/reference
              name: prediction-service-hostpath1
      restartPolicy: Always
      volumes:
        - hostPath:
            path: /home/vagrant/Plataforma_MLOPS/data/logs
          name: prediction-service-hostpath0
        - hostPath:
            path: /home/vagrant/Plataforma_MLOPS/data/reference
          name: prediction-service-hostpath1
