apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-server
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-server
  template:
    metadata:
      labels:
        app: mlflow-server
    spec:
      containers:
      - name: mlflow-server
        image: ghcr.io/mlflow/mlflow:latest
        command:
        - mlflow
        - server
        - --backend-store-uri
        - sqlite:///mlflow/db/mlflow.db
        - --artifacts-destination
        - /mlflow/artifacts
        - --host
        - "0.0.0.0"
        - --port
        - "5000"
        - --allowed-hosts
        - "*"
        ports:
        - containerPort: 5000
        env:
        - name: MLFLOW_FLASK_SERVER_SECRET_KEY
          value: "mlops-energy-secret"
        - name: GUNICORN_CMD_ARGS
          value: "--timeout 120"
        volumeMounts:
        - name: mlflow-db
          mountPath: /mlflow/db
        - name: mlflow-artifacts
          mountPath: /mlflow/artifacts
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 5
        resources:
          requests:
            cpu: "300m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      volumes:
      - name: mlflow-db
        persistentVolumeClaim:
          claimName: mlflow-data-pvc
      - name: mlflow-artifacts
        persistentVolumeClaim:
          claimName: mlflow-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-server
  namespace: mlops
spec:
  selector:
    app: mlflow-server
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500
  type: NodePort
