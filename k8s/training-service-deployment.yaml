apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert --file docker-compose.yml --out k8s/ --volumes hostPath
    kompose.version: 1.32.0 (765fde254)
  labels:
    io.kompose.service: training-service
  name: training-service
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: training-service
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert --file docker-compose.yml --out k8s/ --volumes hostPath
        kompose.version: 1.32.0 (765fde254)
      labels:
        io.kompose.network/plataforma-mlops-mlops-net: "true"
        io.kompose.service: training-service
    spec:
      containers:
        - env:
            - name: EXPERIMENT_NAME
              value: energy-consumption-prediction
            - name: MLFLOW_TRACKING_URI
              value: http://mlflow-server:5000
          image: training-service
          name: training-service
          ports:
            - containerPort: 8003
              hostPort: 8003
              protocol: TCP
          volumeMounts:
            - mountPath: /app/data
              name: training-service-hostpath0
      restartPolicy: Always
      volumes:
        - hostPath:
            path: /home/vagrant/Plataforma_MLOPS/data
          name: training-service-hostpath0
