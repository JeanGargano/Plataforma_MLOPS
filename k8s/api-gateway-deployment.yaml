apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: mlops/api-gateway:v1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 80
      restartPolicy: Always
