apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service
  namespace: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prediction-service
  template:
    metadata:
      labels:
        app: prediction-service
    spec:
      containers:
      - name: prediction-service
        image: mlops/prediction-service:v1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        envFrom:
        - configMapRef:
            name: mlops-config
        volumeMounts:
        - name: app-data
          mountPath: /app/data
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 10
      volumes:
      - name: app-data
        persistentVolumeClaim:
          claimName: app-data-pvc
